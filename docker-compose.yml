services:
  postgres:
    image: postgres:16
    container_name: wallet-transfer-postgres
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet_transfer
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet_transfer"]
      interval: 5s
      timeout: 5s
      retries: 5
