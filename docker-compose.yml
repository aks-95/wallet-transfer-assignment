# Optional: use this only if you do not already have Postgres on :5432.
# Default local dev assumes an existing container (e.g. my-postgres) with:
#   postgres://postgres:root@localhost:5432/wallet_transfer
services:
  postgres:
    image: postgres:16
    container_name: wallet-transfer-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: wallet_transfer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_transfer"]
      interval: 5s
      timeout: 5s
      retries: 5
